## 功能說明

# 🇹🇼 台灣即時影像戰情室 (Taiwan Web Cam War Room)

> 結合台灣地圖與各地「鏡頭君」即時影像，打造如兵棋推演般的戰情室儀表板，讓您一眼掌握全台各地實況。

## 💡 專案簡介

這是一個以網頁呈現的視覺化戰情室專案。我們以台灣地圖為基底，將全台各地的即時影像（鏡頭君）直播標記並疊加在地圖上。使用者不需要逐一切換頻道，就能像指揮官一樣，直觀且全面地總覽各地目前的天氣與路況。

## ✨ 功能特色

- 🗺️ **互動式台灣地圖**：直觀的地圖介面，快速定位並尋找特定區域的攝影機。
- 📹 **即時影像疊加**：直接在地圖上觀看各地 YouTube 即時直播畫面。
- 🎯 **戰情室體驗**：高科技感的 UI 介面設計，打造專業的兵棋推演視覺感受。
- 📡 **豐富的資料來源**：彙整全台各熱門景點、國道及省道等鏡頭君直播。

            { level: 3, videoId: "uvwfYzwY8tg", lat: 25.0970, lng: 121.5877, name: "台北碧山巖" },
            { level: 3, videoId: "AE1wiaqDZjw", lat: 24.6730, lng: 120.9850, name: "獅頭山大埔水庫" },
            { level: 3, videoId: "8KnqJBf_dow", lat: 23.4400, lng: 120.6000, name: "觸口遊客中心" },
            { level: 3, videoId: "LSkq-wHMxQY", lat: 23.2644, lng: 120.9620, name: "南橫埡口" },
            { level: 3, videoId: "53tHc92PDfE", lat: 24.1477, lng: 120.6736, name: "台中市各要路口" },
            { level: 3, videoId: "P0CYZnOGxHU", lat: 22.9997, lng: 120.2270, name: "台南市重要路口" },
            { level: 3, videoId: "qPXYKz_i9dY", lat: 25.0169, lng: 121.4627, name: "新北市重要路口" },

//          { level: 4, videoId: "xxxxxxxxxxx", lat: 12.3456, lng: 123.4567, name: "第四級 最低優先權" },  
            { level: 4, videoId: "yeoV-wBdoxQ", lat: 22.9150, lng: 120.1750, name: "黃金海岸，台南市南區" },
            { level: 4, videoId: "RttyIGHbN_w", lat: 25.1610, lng: 121.5390, name: "陽明書屋" },
            { level: 4, videoId: "-srNHTE-Nf0", lat: 24.4440, lng: 118.3580, name: "金門134高地" },
            { level: 4, videoId: "34h_Cy_n0Ok", lat: 25.0840, lng: 121.5290, name: "劍潭山微風平台" },
            { level: 4, videoId: "5YDXZ1aiR5Y", lat: 24.8210, lng: 121.3530, name: "桃園三龜戲水觀景平台" },
            { level: 4, videoId: "P_U_7xq8Vcg", lat: 23.8569, lng: 120.9324, name: "九蛙疊像" }
        ];

        // 4. 建立圖層群組 (LayerGroup) 來分類管理不同層級的標記
        const level0Group = L.layerGroup();
        const level1Group = L.layerGroup();
        const level2Group = L.layerGroup();
        const level3Group = L.layerGroup();
        const level4Group = L.layerGroup();
        const hiddenPointGroup = L.layerGroup();


        const youtubeOrigin = window.location.origin === 'null' ? '' : `&origin=${encodeURIComponent(window.location.origin)}`;
        const isMobile = () => window.innerWidth <= 768;
        const getMaxVideoTiles = () => isMobile() ? 4 : 8; // 手機版最多顯示 4 個，電腦版 8 個

        function createYoutubeEmbedUrl(videoId, autoplay = false) {
            const autoplayParam = autoplay ? '&autoplay=1' : '';

            return `https://www.youtube.com/embed/${videoId}?mute=1${autoplayParam}&playsinline=1${youtubeOrigin}`;
        }

        function escapeHtml(text) {
            return text.replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function renderConnectorLines() {
            const connectorLayer = document.getElementById('connection-layer');
            const mapRect = map.getContainer().getBoundingClientRect();
            const lines = [...document.querySelectorAll('.video-tile[data-lat][data-lng]')]
                .map(tile => {
                    const tileRect = tile.getBoundingClientRect();
                    const lat = Number(tile.dataset.lat);
                    const lng = Number(tile.dataset.lng);
                    const targetPoint = map.latLngToContainerPoint([lat, lng]);
                    const targetX = mapRect.left + targetPoint.x;
                    const targetY = mapRect.top + targetPoint.y;
                    const tileMidY = tileRect.top + tileRect.height / 2;
                    const tileMidX = tileRect.left + tileRect.width / 2;
                    
                    let startX = tileMidX < targetX ? tileRect.right : tileRect.left;
                    let startY = tileMidY;
                    if (isMobile()) { // 手機版雷射從影片下方射出
                        startX = tileMidX;
                        startY = tileRect.bottom;
                    }

                    return `
                        <line class="connection-line" x1="${startX}" y1="${startY}" x2="${targetX}" y2="${targetY}"></line>
                        <circle class="connection-point" cx="${targetX}" cy="${targetY}" r="4"></circle>
                    `;
                });

            connectorLayer.setAttribute('viewBox', `0 0 ${window.innerWidth} ${window.innerHeight}`);
            connectorLayer.innerHTML = lines.join('');
        }

        function calculateWallWidthValue(tileCount) {
            if (!tileCount) return 300;

            const titleHeight = 24;
            const verticalMargin = 0;
            const tileGap = 0;
            const centerMapMinWidth = 360;
            const availableColumnHeight = window.innerHeight - verticalMargin - tileGap * (tileCount - 1);
            const targetFrameHeight = Math.max(90, (availableColumnHeight / tileCount) - titleHeight);
            const targetWidth = targetFrameHeight * 16 / 9;
            const maxWidthByViewport = Math.max(220, (window.innerWidth - centerMapMinWidth) / 2 - 20);
            const maxWidthByCount = tileCount <= 1
                ? 720
                : tileCount <= 2
                    ? 620
                    : tileCount <= 3
                        ? 520
                        : tileCount <= 4
                            ? 440
                            : tileCount <= 5
                                ? 360
                                : 320;
            const minWidthByCount = tileCount >= 6 ? 180 : 240;
            const wallWidth = Math.min(maxWidthByViewport, maxWidthByCount, Math.max(minWidthByCount, targetWidth));

            return Math.round(wallWidth);
        }

        function calculateWallWidth(tileCount) {
            return `${calculateWallWidthValue(tileCount)}px`;
        }

        function getLevelVisibleCams() {
            const bounds = map.getBounds();

            return webcams
                .filter(cam => bounds.contains([cam.lat, cam.lng]));
        }

        function selectWallCams(cams) {
            const maxTiles = getMaxVideoTiles();
            const center = map.getCenter();
            
            // 計算每個點到地圖中心的距離，以便當 level 相同時使用距離排序
            const camsWithDistance = cams.map((cam) => ({ 
                ...cam, 
                distance: map.distance(center, [cam.lat, cam.lng]) 
            }));

            if (camsWithDistance.length <= maxTiles) {
                return camsWithDistance;
            }

            const sortedCams = camsWithDistance
                .sort((a, b) => a.level - b.level || a.distance - b.distance);

            return sortedCams.slice(0, maxTiles);
        }

        function splitWallCams(cams) {
            if (isMobile()) return { westCams: cams, eastCams: [] }; // 手機版所有影片集中在同一個面板

            const westToEastCams = [...cams].sort((a, b) => a.lng - b.lng || b.lat - a.lat);
            const leftCount = cams.length < 4 ? 0 : Math.ceil(westToEastCams.length / 2);

            return {
                westCams: westToEastCams.slice(0, leftCount).sort((a, b) => b.lat - a.lat || a.lng - b.lng),
                eastCams: westToEastCams.slice(leftCount).sort((a, b) => b.lat - a.lat || a.lng - b.lng)
            };
        }

        function getVideoWallRects(westCount, eastCount) {
            if (isMobile()) {
                if (westCount === 0) return [];
                return [{ left: 0, right: window.innerWidth, top: 0, bottom: window.innerHeight / 2 }];
            }

            const top = 0;
            const bottom = window.innerHeight;
            const rects = [];

            if (westCount) {
                rects.push({
                    left: 0,
                    right: calculateWallWidthValue(westCount),
                    top,
                    bottom
                });
            }

            if (eastCount) {
                rects.push({
                    left: window.innerWidth - calculateWallWidthValue(eastCount),
                    right: window.innerWidth,
                    top,
                    bottom
                });
            }

            return rects;
        }

        function isCamCoveredByVideoWall(cam, rects) {
            const mapRect = map.getContainer().getBoundingClientRect();
            const point = map.latLngToContainerPoint([cam.lat, cam.lng]);
            const x = mapRect.left + point.x;
            const y = mapRect.top + point.y;

            return rects.some(rect =>
                x >= rect.left &&
                x <= rect.right &&
                y >= rect.top &&
                y <= rect.bottom
            );
        }

        function getDisplayCams() {
            let candidates = getLevelVisibleCams();

            for (let i = 0; i < 3; i++) {
                const selectedCams = selectWallCams(candidates);
                const { westCams, eastCams } = splitWallCams(selectedCams);
                const wallRects = getVideoWallRects(westCams.length, eastCams.length);
                const uncoveredCams = candidates.filter(cam => !isCamCoveredByVideoWall(cam, wallRects));

                if (uncoveredCams.length === candidates.length) break;
                candidates = uncoveredCams;
            }

            return selectWallCams(candidates);
        }

        function createHiddenPoint(cam) {
            return L.circleMarker([cam.lat, cam.lng], {
                radius: 4,
                color: '#260000',
                weight: 1,
                fillColor: '#ff2d2d',
                fillOpacity: 0.95
            }).bindTooltip(cam.name, {
                direction: 'top', // 顯示在點的上方
                offset: [0, -5],  // 往上微調一點點避免擋住紅點
                opacity: 0.9      // 稍微有點透明度的質感
            }).on('click', () => {
                map.setView([cam.lat, cam.lng], map.getZoom() + 2);
            });
        }

        let currentRenderedCamIds = ''; // 紀錄目前影片牆上已經渲染的影片 ID

        function renderVideoWall() {
            const selectedCams = getDisplayCams();
            const newRenderedCamIds = selectedCams.map(cam => cam.videoId).join(',');
            const mobile = isMobile();
            const { westCams, eastCams } = splitWallCams(selectedCams);

            const leftWall = document.getElementById('left-video-wall');
            const rightWall = document.getElementById('right-video-wall');
            
            // 確保每次呼叫時 (包含視窗縮放) 皆會更新影片牆的寬度，並動態調整右下角工具位置以避免被影片牆遮擋
            const leftWidthStr = westCams.length && !mobile ? calculateWallWidth(westCams.length) : '0px';
            const rightWidthStr = eastCams.length && !mobile ? calculateWallWidth(eastCams.length) : '0px';
            leftWall.style.width = mobile ? '100vw' : leftWidthStr;
            rightWall.style.width = rightWidthStr;

            // 針對手機板將所有影片牆重置為上方半視窗的網格佈局
            const mapEl = document.getElementById('map');

            if (mobile) {
                leftWall.style.height = 'auto';
                leftWall.style.position = 'fixed';
                leftWall.style.top = '0';
                leftWall.style.left = '0';
                leftWall.style.right = '0';
                leftWall.style.borderRight = 'none';
                leftWall.style.borderBottom = '1px solid rgba(0, 255, 204, 0.35)';
                leftWall.style.gridTemplateColumns = '1fr 1fr';
                leftWall.style.gridTemplateRows = 'auto';
                leftWall.style.gridAutoRows = 'minmax(0, auto)';
                leftWall.style.alignContent = 'start'; // 讓影片群組緊貼上方，消除平均分配空間產生的縫隙
            } else {
                leftWall.style.height = '100vh';
                leftWall.style.position = '';
                leftWall.style.top = '';
                leftWall.style.left = '';
                leftWall.style.right = '';
                leftWall.style.borderRight = '1px solid rgba(0, 255, 204, 0.35)';
                leftWall.style.borderBottom = 'none';
                leftWall.style.gridTemplateColumns = '1fr';
                leftWall.style.gridAutoRows = '';
                leftWall.style.alignContent = 'center';

                if (mapEl) {
                    mapEl.style.position = '';
                    mapEl.style.top = '';
                    mapEl.style.left = '';
                    mapEl.style.right = '';
                    mapEl.style.bottom = '';
                    mapEl.style.height = '100vh';
                }
            }

            const footerLinks = document.getElementById('footer-links');
            if (footerLinks) footerLinks.style.right = mobile ? '15px' : `calc(${rightWidthStr} + 15px)`;
            const calibTool = document.getElementById('calibration-tool');
            if (calibTool) calibTool.style.right = mobile ? '20px' : `calc(${rightWidthStr} + 20px)`;
            const leafletControl = document.querySelector('.leaflet-bottom.leaflet-right');
            if (leafletControl) leafletControl.style.right = rightWidthStr;
            const leafletLeftControl = document.querySelector('.leaflet-left');
            if (leafletLeftControl) leafletLeftControl.style.left = leftWidthStr;

            const updateMobileMapPosition = () => {
                if (!mobile) return;
                const wallHeight = leftWall.getBoundingClientRect().height;
                mapEl.style.position = 'fixed';
                mapEl.style.top = `${wallHeight}px`;
                mapEl.style.left = '0';
                mapEl.style.right = '0';
                mapEl.style.bottom = '0';
                mapEl.style.height = `${window.innerHeight - wallHeight}px`;
            };

            // 若畫面上要顯示的攝影機名單沒有改變，就不重新渲染 DOM，避免影片頻繁中斷與重新載入
            if (currentRenderedCamIds === newRenderedCamIds) {
                updateMarkersVisibility(selectedCams);
                updateMobileMapPosition();
                requestAnimationFrame(renderConnectorLines);
                return;
            }
            currentRenderedCamIds = newRenderedCamIds;

            [
                { wall: leftWall, tiles: westCams },
                { wall: rightWall, tiles: eastCams }
            ].forEach(({ wall, tiles }) => {
                wall.style.display = tiles.length ? 'grid' : 'none';
                if (!mobile) {
                    wall.style.gridTemplateRows = `repeat(${Math.max(tiles.length, 1)}, auto)`;
                }
                wall.innerHTML = tiles.map(cam => `
                    <div class="video-tile" data-lat="${cam.lat}" data-lng="${cam.lng}">
                        <div class="video-tile-title">🔴 ${escapeHtml(cam.name)}</div>
                        <div class="video-tile-frame">
                            <iframe
                                src="${createYoutubeEmbedUrl(cam.videoId, true)}"
                                title="${escapeHtml(cam.name)}"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                referrerpolicy="strict-origin-when-cross-origin"
                                loading="lazy"
                                allowfullscreen>
                            </iframe>
                        </div>
                    </div>
                `).join('');
            });
            updateMobileMapPosition();
            updateMarkersVisibility(selectedCams);
            requestAnimationFrame(renderConnectorLines);
        }

        // 5. 巡迴資料並建立標記點與彈出視窗
        webcams.forEach(cam => 
        {
            const youtubeEmbedUrl = createYoutubeEmbedUrl(cam.videoId, true);
            const popupContent = `
                <div class="cam-title">🔴 ${cam.name}</div>
                <div class="video-container">
                    <iframe 
                        src="${youtubeEmbedUrl}"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        loading="lazy"
                        allowfullscreen
                        style="width:100%; height:100%; border:none;">
                    </iframe>
                </div>
            `;

            cam.marker = L.marker([cam.lat, cam.lng])
                .bindPopup(popupContent)
                .on('click', () => {
                    map.setView([cam.lat, cam.lng], map.getZoom() + 2);
                });
        }
    );

        // 6. 更新標記顯示狀態 (根據當前畫面影片數量)
        
        function updateMarkersVisibility(displayedCams = getDisplayCams()) {
            const displayedCamNames = new Set(displayedCams.map(cam => cam.name));

            level0Group.clearLayers();
            level1Group.clearLayers();
            level2Group.clearLayers();
            level3Group.clearLayers();
            level4Group.clearLayers();
            hiddenPointGroup.clearLayers();

            webcams.forEach(cam => {
                if (!displayedCamNames.has(cam.name)) {
                    hiddenPointGroup.addLayer(createHiddenPoint(cam));
                    return;
                }

                if (cam.level === 0) {
                    level0Group.addLayer(cam.marker);
                } else if (cam.level === 1) {
                    level1Group.addLayer(cam.marker);
                } else if (cam.level === 2) {
                    level2Group.addLayer(cam.marker);
                } else if (cam.level === 3) {
                    level3Group.addLayer(cam.marker);
                } else if (cam.level === 4) {
                    level4Group.addLayer(cam.marker);
                }
            });
            
            // 所有有顯示影片的圖層及隱藏標記圖層預設都加上地圖
            if (!map.hasLayer(level0Group)) map.addLayer(level0Group);
            if (!map.hasLayer(level1Group)) map.addLayer(level1Group);
            if (!map.hasLayer(level2Group)) map.addLayer(level2Group);
            if (!map.hasLayer(level3Group)) map.addLayer(level3Group);
            if (!map.hasLayer(level4Group)) map.addLayer(level4Group);
            if (!map.hasLayer(hiddenPointGroup)) map.addLayer(hiddenPointGroup);
        }

        // 7. 綁定縮放事件並執行第一次初始化
        map.on('zoomend', () => {
            updateMarkersVisibility();
            renderVideoWall();
        });
        map.on('moveend', renderVideoWall);
        map.on('zoom move', renderConnectorLines);
        window.addEventListener('resize', () => {
            map.invalidateSize(); // 強制讓 Leaflet 重新計算地圖容器大小 (例如旋轉手機時)
            renderVideoWall();
            renderConnectorLines();
        });
        updateMarkersVisibility(); // 網頁載入時馬上檢查一次
        renderVideoWall();

        // ==========================================
        // 氣象疊圖按鈕與校正工具事件綁定
        // ==========================================
        const radarBtn = document.getElementById('radar-btn');
        const rainfallBtn = document.getElementById('rainfall-btn');
        const calibrationTool = document.getElementById('calibration-tool');
        const calibrationTitle = document.getElementById('calibration-title');
        const copyCodeLabel = document.getElementById('copy-code-label');
        const sliderRanges = {
            radar: {
                n: { min: '24.000', max: '28.000' },
                s: { min: '18.000', max: '22.000' },
                w: { min: '115.000', max: '120.000' },
                e: { min: '121.000', max: '127.000' }
            },
            rainfall: {
                n: { min: '24.000', max: '27.000' },
                s: { min: '20.000', max: '22.500' },
                w: { min: '118.500', max: '121.000' },
                e: { min: '122.000', max: '124.500' }
            }
        };
        const weatherOverlays = {
            radar: {
                title: '🛠️ 雷達圖校正工具',
                boundsName: 'radarBounds',
                imageUrl: radarImageUrl,
                overlay: radarOverlay,
                btn: radarBtn,
                bounds: radarBounds.map(point => [...point])
            },
            rainfall: {
                title: '🛠️ 雨量圖校正工具',
                boundsName: 'rainfallBounds',
                imageUrl: rainfallImageUrl,
                overlay: rainfallOverlay,
                btn: rainfallBtn,
                bounds: rainfallBounds.map(point => [...point])
            }
        };
        let activeCalibrationOverlay = 'rainfall';
        let isRadarVisible = true;
        let isRainfallVisible = true;

        function getBoundsValues(bounds) {
            return {
                s: bounds[0][0].toFixed(3),
                w: bounds[0][1].toFixed(3),
                n: bounds[1][0].toFixed(3),
                e: bounds[1][1].toFixed(3)
            };
        }

        function setCalibrationTarget(type) {
            const config = weatherOverlays[type];
            const values = getBoundsValues(config.bounds);

            activeCalibrationOverlay = type;
            calibrationTitle.innerText = config.title;
            copyCodeLabel.innerText = `請複製此陣列貼回 code 中取代原有的 ${config.boundsName}：`;

            ['n', 's', 'w', 'e'].forEach(dir => {
                const slider = document.getElementById(`slider-${dir}`);
                const range = sliderRanges[type][dir];
                slider.min = range.min;
                slider.max = range.max;
                slider.value = values[dir];
                document.getElementById(`val-${dir}`).innerText = values[dir];
            });

            document.getElementById('copy-code').value = `[[${values.s}, ${values.w}], [${values.n}, ${values.e}]]`;
        }

        function setWeatherOverlayVisible(type, visible) {
            const config = weatherOverlays[type];

            setCalibrationTarget(type);
            if (visible) {
                config.overlay.setUrl(`${config.imageUrl}?t=${new Date().getTime()}`); // 加上時間戳記確保取得最新圖檔
                config.overlay.addTo(map);
                config.btn.classList.add('active');
            } else {
                map.removeLayer(config.overlay);
                config.btn.classList.remove('active');
            }
        }

        radarBtn.classList.add('active');
        rainfallBtn.classList.add('active');
        setCalibrationTarget(activeCalibrationOverlay);

        radarBtn.addEventListener('click', () => {
            isRadarVisible = !isRadarVisible;
            setWeatherOverlayVisible('radar', isRadarVisible);
        });

        rainfallBtn.addEventListener('click', () => {
            isRainfallVisible = !isRainfallVisible;
            setWeatherOverlayVisible('rainfall', isRainfallVisible);
        });

        // ==========================================
        // 臨時疊圖校正工具邏輯 (拖曳滑軌即時更新疊圖)
        // ==========================================
        ['n', 's', 'w', 'e'].forEach(dir => {
            document.getElementById(`slider-${dir}`).addEventListener('input', () => {
                const n = parseFloat(document.getElementById('slider-n').value).toFixed(3);
                const s = parseFloat(document.getElementById('slider-s').value).toFixed(3);
                const w = parseFloat(document.getElementById('slider-w').value).toFixed(3);
                const e = parseFloat(document.getElementById('slider-e').value).toFixed(3);
                const values = { n, s, w, e };
                const config = weatherOverlays[activeCalibrationOverlay];
                const nextBounds = [[parseFloat(s), parseFloat(w)], [parseFloat(n), parseFloat(e)]];

                document.getElementById(`val-${dir}`).innerText = values[dir]; // 更新畫面數字
                config.bounds = nextBounds;
                config.overlay.setBounds(nextBounds); // 即時更新目前選取的疊圖邊界
                document.getElementById('copy-code').value = `[[${s}, ${w}], [${n}, ${e}]]`; // 產生最終 Code
            });
        });

        // ==========================================
        // 獨立開關校正工具面板
        // ==========================================
        const calibBtn = document.getElementById('calib-btn');
        calibBtn.addEventListener('click', () => {
            if (calibrationTool.style.display === 'none') {
                calibrationTool.style.display = 'block';
            } else {
                calibrationTool.style.display = 'none';
            }
        });
    </script>
</body>
</html>
