        body, html {

        #map {

            width: 100vw;
        }

        .video-wall {
            position: fixed;
            top: 0;
            height: 100vh;
            background-color: #121212;
            padding: 0;
            box-sizing: border-box;
            display: grid;
            gap: 0;
            align-content: center;
            z-index: 500;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .video-wall-left {
            left: 0;
            border-right: 1px solid rgba(0, 255, 204, 0.35);
        }

        .video-wall-right {
            right: 0;
            border-left: 1px solid rgba(0, 255, 204, 0.35);
        }

        .connection-layer {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 450;
            pointer-events: none;
        }

        .connection-line {
            stroke: rgba(0, 255, 204, 0.75);
            stroke-width: 2;
            stroke-dasharray: 6 5;
            filter: drop-shadow(0 0 5px rgba(0, 255, 204, 0.75));
        }

        .connection-point {
            fill: #00ffcc;
            stroke: rgba(0, 0, 0, 0.65);
            stroke-width: 2;
        }

        .video-tile {
            min-height: 0;
            overflow: hidden;
            background-color: #000;
            pointer-events: auto;
        }

        .video-tile-title {
            height: 24px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            color: #e7fff9;
            background-color: rgba(0, 0, 0, 0.72);
            font-size: 12px;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes skeleton-pulse {
            0%, 100% { background-color: #111; }
            50% { background-color: #1e1e1e; }
        }

        .video-tile-frame {
            position: relative;
            aspect-ratio: 16 / 9;
            height: auto;
            background-color: #111;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        .video-tile-frame iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media (max-width: 900px) {
            .video-wall { width: 220px; }
        }

        @media (max-width: 768px) {
            #map {
                position: fixed;
                top: 0;
                bottom: 0;
                height: auto;
                width: 100vw;
            }
            .video-wall {
                bottom: auto;
                width: 100vw;
                grid-template-columns: 1fr 1fr;
                grid-auto-rows: minmax(0, auto);
                grid-auto-flow: row;
            }
            .video-tile { min-height: 0; }
            .video-tile-title { font-size: 7px; }
            .footer-links {
                bottom: 12px;
                padding: 5px 8px;
                font-size: 6px;
                line-height: 1.5;
                text-align: right;
            }
            .leaflet-control-attribution { font-size: 8px !important; }
        }

        .leaflet-popup-content-wrapper {
            background-color: #1e1e1e;
            color: #fff;
            border-radius: 8px;
        }
        .leaflet-popup-tip { background-color: #1e1e1e; }
        .leaflet-popup-content {
            width: 320px !important;
            margin: 15px;
        }

        .cam-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #e7fff9;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 4px;
            margin-top: 10px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .video-error {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            color: #ffcc00;
            font-size: 14px;
        }
        .video-error a { color: #00ffcc; text-decoration: none; font-weight: bold; }
        .video-error a:hover { text-decoration: underline; }

        .footer-links {
            position: fixed;
            bottom: 25px;

        .footer-links a:hover { color: #fff; text-decoration: underline; }
        .footer-links a.active { color: #ffcc00; }

        .leaflet-bottom.leaflet-right { transition: right 0.2s ease-out; }
        .leaflet-left { transition: left 0.2s ease-out; }

        .leaflet-control-attribution {
            font-size: 11px !important;
            background: rgba(0, 0, 0, 0.5) !important;
        }

            let t;

        function isValidYoutubeId(id) {
            return typeof id === 'string' && /^[a-zA-Z0-9_-]{11}$/.test(id);

        function escapeHtml(text) {

                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

            { level: 3, videoId: "qPXYKz_i9dY", lat: 25.0169, lng: 121.4627, name: "新北市重要路口" },

            // level 4 — 最低優先
            { level: 4, videoId: "yeoV-wBdoxQ", lat: 22.9150, lng: 120.1750, name: "黃金海岸，台南市南區" },
            { level: 4, videoId: "RttyIGHbN_w", lat: 25.1610, lng: 121.5390, name: "陽明書屋" },
            { level: 4, videoId: "-srNHTE-Nf0", lat: 24.4440, lng: 118.3580, name: "金門134高地" },
            { level: 4, videoId: "34h_Cy_n0Ok", lat: 25.0840, lng: 121.5290, name: "劍潭山微風平台" },
            { level: 4, videoId: "5YDXZ1aiR5Y", lat: 24.8210, lng: 121.3530, name: "桃園三龜戲水觀景平台" },
            { level: 4, videoId: "P_U_7xq8Vcg", lat: 23.8569, lng: 120.9324, name: "九蛙疊像" }
        ].filter(cam => isValidYoutubeId(cam.videoId));

        // 5. 圖層群組 (索引 0-4 對應 level，取代原本 5 個獨立變數)
        const levelGroups = Array.from({ length: 5 }, () => L.layerGroup());
        const hiddenPointGroup = L.layerGroup();

        const youtubeOrigin = window.location.origin === 'null' ? '' : `&origin=${encodeURIComponent(window.location.origin)}`;
        const isMobile = () => window.innerWidth <= 768;
        const getMaxVideoTiles = () => isMobile() ? 4 : 8;

        function createYoutubeEmbedUrl(videoId, autoplay) {
            return `https://www.youtube.com/embed/${videoId}?mute=1${autoplay ? '&autoplay=1' : ''}&playsinline=1${youtubeOrigin}`;
        }

        function renderConnectorLines() {
            const connectorLayer = document.getElementById('connection-layer');
            const mapRect = map.getContainer().getBoundingClientRect();
            const mobile = isMobile();
            const lines = [...document.querySelectorAll('.video-tile[data-lat][data-lng]')]
                .map(tile => {
                    const tileRect = tile.getBoundingClientRect();
                    const lat = Number(tile.dataset.lat);
                    const lng = Number(tile.dataset.lng);
                    const targetPoint = map.latLngToContainerPoint([lat, lng]);
                    const targetX = mapRect.left + targetPoint.x;
                    const targetY = mapRect.top + targetPoint.y;
                    const tileMidX = tileRect.left + tileRect.width / 2;
                    const tileMidY = tileRect.top + tileRect.height / 2;
                    const startX = mobile ? tileMidX : (tileMidX < targetX ? tileRect.right : tileRect.left);
                    const startY = mobile ? tileRect.bottom : tileMidY;
                    return `<line class="connection-line" x1="${startX}" y1="${startY}" x2="${targetX}" y2="${targetY}"></line>
                        <circle class="connection-point" cx="${targetX}" cy="${targetY}" r="4"></circle>`;
                });
            connectorLayer.setAttribute('viewBox', `0 0 ${window.innerWidth} ${window.innerHeight}`);
            connectorLayer.innerHTML = lines.join('');
        }

        function calculateWallWidthValue(tileCount) {
            if (!tileCount) return 300;
            const titleHeight = 24;
            const targetFrameHeight = Math.max(90, window.innerHeight / tileCount - titleHeight);
            const targetWidth = targetFrameHeight * 16 / 9;
            const maxWidthByViewport = Math.max(220, (window.innerWidth - 360) / 2 - 20);
            const maxWidthByCount = tileCount <= 1 ? 720 : tileCount <= 2 ? 620 : tileCount <= 3 ? 520 : tileCount <= 4 ? 440 : tileCount <= 5 ? 360 : 320;
            const minWidthByCount = tileCount >= 6 ? 180 : 240;
            return Math.round(Math.min(maxWidthByViewport, maxWidthByCount, Math.max(minWidthByCount, targetWidth)));
        }

        function calculateWallWidth(tileCount) {
            return `${calculateWallWidthValue(tileCount)}px`;
        }

        function getLevelVisibleCams() {
            const bounds = map.getBounds();
            return webcams.filter(cam => bounds.contains([cam.lat, cam.lng]));
        }

        function selectWallCams(cams) {
            const maxTiles = getMaxVideoTiles();
            const center = map.getCenter();
            const camsWithDistance = cams.map(cam => ({
                ...cam,
                distance: map.distance(center, [cam.lat, cam.lng])
            }));
            if (camsWithDistance.length <= maxTiles) return camsWithDistance;
            return camsWithDistance
                .sort((a, b) => a.level - b.level || a.distance - b.distance)
                .slice(0, maxTiles);
        }

        function splitWallCams(cams) {
            if (isMobile()) return { westCams: cams, eastCams: [] };
            const westToEastCams = [...cams].sort((a, b) => a.lng - b.lng || b.lat - a.lat);
            const leftCount = cams.length < 4 ? 0 : Math.ceil(westToEastCams.length / 2);
            return {
                westCams: westToEastCams.slice(0, leftCount).sort((a, b) => b.lat - a.lat || a.lng - b.lng),
                eastCams: westToEastCams.slice(leftCount).sort((a, b) => b.lat - a.lat || a.lng - b.lng)
            };
        }

        function getVideoWallRects(westCount, eastCount) {
            if (isMobile()) {
                return westCount ? [{ left: 0, right: window.innerWidth, top: 0, bottom: window.innerHeight / 2 }] : [];
            }
            const rects = [];
            if (westCount) rects.push({ left: 0, right: calculateWallWidthValue(westCount), top: 0, bottom: window.innerHeight });
            if (eastCount) rects.push({ left: window.innerWidth - calculateWallWidthValue(eastCount), right: window.innerWidth, top: 0, bottom: window.innerHeight });
            return rects;
        }

        function isCamCoveredByVideoWall(cam, rects) {
            const mapRect = map.getContainer().getBoundingClientRect();
            const point = map.latLngToContainerPoint([cam.lat, cam.lng]);
            const x = mapRect.left + point.x;
            const y = mapRect.top + point.y;
            return rects.some(r => x >= r.left && x <= r.right && y >= r.top && y <= r.bottom);
        }

        function getDisplayCams() {
            let candidates = getLevelVisibleCams();
            for (let i = 0; i < 3; i++) {
                const selectedCams = selectWallCams(candidates);
                const { westCams, eastCams } = splitWallCams(selectedCams);
                const wallRects = getVideoWallRects(westCams.length, eastCams.length);
                const uncoveredCams = candidates.filter(cam => !isCamCoveredByVideoWall(cam, wallRects));
                if (uncoveredCams.length === candidates.length) break;
                candidates = uncoveredCams;
            }
            return selectWallCams(candidates);
        }

        function createHiddenPoint(cam) {
            return L.circleMarker([cam.lat, cam.lng], {
                radius: 4, color: '#260000', weight: 1, fillColor: '#ff2d2d', fillOpacity: 0.95
            }).bindTooltip(cam.name, { direction: 'top', offset: [0, -5], opacity: 0.9 })
              .on('click', () => { map.setView([cam.lat, cam.lng], map.getZoom() + 2); });
        }

        // 6. 建立標記 — Popup 按需載入 iframe，關閉時釋放影片資源
        webcams.forEach(cam => {
            cam.marker = L.marker([cam.lat, cam.lng])
                .bindPopup(`<div class="cam-title">🔴 ${escapeHtml(cam.name)}</div><div class="video-container"></div>`)
                .on('click', () => { map.setView([cam.lat, cam.lng], map.getZoom() + 2); })
                .on('popupopen', (e) => {
                    const container = e.popup.getElement()?.querySelector('.video-container');
                    if (container && !container.querySelector('iframe')) {
                        container.innerHTML = `<iframe
                            src="${createYoutubeEmbedUrl(cam.videoId, true)}"
                            title="${escapeHtml(cam.name)}"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            loading="lazy"
                            allowfullscreen
                            style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"></iframe>`;
                    }
                })
                .on('popupclose', (e) => {
                    const container = e.popup.getElement()?.querySelector('.video-container');
                    if (container) container.innerHTML = '';
                });
        });

        // 7. 更新標記顯示狀態
        function updateMarkersVisibility(displayedCams) {
            if (!displayedCams) displayedCams = getDisplayCams();
            const displayedSet = new Set(displayedCams.map(cam => cam.name));

            levelGroups.forEach(g => g.clearLayers());
            hiddenPointGroup.clearLayers();

            webcams.forEach(cam => {
                if (!displayedSet.has(cam.name)) {
                    hiddenPointGroup.addLayer(createHiddenPoint(cam));
                    return;
                }
                if (cam.level >= 0 && cam.level <= 4) levelGroups[cam.level].addLayer(cam.marker);
            });

            [...levelGroups, hiddenPointGroup].forEach(g => {
                if (!map.hasLayer(g)) map.addLayer(g);
            });
        }

        // 8. 渲染影片牆
        // 快取鍵包含裝置模式 (m/d)，確保 mobile ↔ desktop 切換時強制重繪
        let currentRenderedKey = '';

        function renderVideoWall() {
            const mobile = isMobile();
            const selectedCams = getDisplayCams();
            const newKey = `${mobile ? 'm' : 'd'}:${selectedCams.map(c => c.videoId).join(',')}`;
            const { westCams, eastCams } = splitWallCams(selectedCams);

            const leftWall = document.getElementById('left-video-wall');
            const rightWall = document.getElementById('right-video-wall');
            const mapEl = document.getElementById('map');

            const leftWidthStr = westCams.length && !mobile ? calculateWallWidth(westCams.length) : '0px';
            const rightWidthStr = eastCams.length && !mobile ? calculateWallWidth(eastCams.length) : '0px';

            leftWall.style.width = mobile ? '100vw' : leftWidthStr;
            rightWall.style.width = rightWidthStr;

            if (mobile) {
                leftWall.style.height = 'auto';
                leftWall.style.position = 'fixed';
                leftWall.style.top = '0';
                leftWall.style.left = '0';
                leftWall.style.right = '0';
                leftWall.style.borderRight = 'none';
                leftWall.style.borderBottom = '1px solid rgba(0, 255, 204, 0.35)';
                leftWall.style.gridTemplateColumns = '1fr 1fr';
                leftWall.style.gridTemplateRows = 'auto';
                leftWall.style.gridAutoRows = 'minmax(0, auto)';
                leftWall.style.alignContent = 'start';
            } else {
                leftWall.style.height = '100vh';
                leftWall.style.position = '';
                leftWall.style.top = '';
                leftWall.style.left = '';
                leftWall.style.right = '';
                leftWall.style.borderRight = '1px solid rgba(0, 255, 204, 0.35)';
                leftWall.style.borderBottom = 'none';
                leftWall.style.gridTemplateColumns = '1fr';
                leftWall.style.gridAutoRows = '';
                leftWall.style.alignContent = 'center';
                mapEl.style.position = '';
                mapEl.style.top = '';
                mapEl.style.left = '';
                mapEl.style.right = '';
                mapEl.style.bottom = '';
                mapEl.style.height = '';
            }

            const footerLinks = document.getElementById('footer-links');
            const calibTool = document.getElementById('calibration-tool');
            const leafletControl = document.querySelector('.leaflet-bottom.leaflet-right');
            const leafletLeftControl = document.querySelector('.leaflet-left');

            if (footerLinks) footerLinks.style.right = mobile ? '15px' : `calc(${rightWidthStr} + 15px)`;
            if (calibTool) calibTool.style.right = mobile ? '20px' : `calc(${rightWidthStr} + 20px)`;
            if (leafletControl) leafletControl.style.right = rightWidthStr;
            if (leafletLeftControl) leafletLeftControl.style.left = leftWidthStr;

            const updateMobileMapPosition = () => {
                if (!mobile) return;
                const wallHeight = leftWall.getBoundingClientRect().height;
                mapEl.style.position = 'fixed';
                mapEl.style.top = `${wallHeight}px`;
                mapEl.style.left = '0';
                mapEl.style.right = '0';
                mapEl.style.bottom = '0';
                mapEl.style.height = `${window.innerHeight - wallHeight}px`;
            };

            if (currentRenderedKey === newKey) {
                updateMarkersVisibility(selectedCams);
                updateMobileMapPosition();
                requestAnimationFrame(renderConnectorLines);
                return;
            }
            currentRenderedKey = newKey;

            [
                { wall: leftWall, tiles: westCams },
                { wall: rightWall, tiles: eastCams }
            ].forEach(({ wall, tiles }) => {
                wall.style.display = tiles.length ? 'grid' : 'none';
                if (!mobile) wall.style.gridTemplateRows = `repeat(${Math.max(tiles.length, 1)}, auto)`;
                wall.innerHTML = tiles.map(cam => `
                    <div class="video-tile" data-lat="${cam.lat}" data-lng="${cam.lng}">
                        <div class="video-tile-title">🔴 ${escapeHtml(cam.name)}</div>
                        <div class="video-tile-frame">
                            <iframe
                                src="${createYoutubeEmbedUrl(cam.videoId, true)}"
                                title="${escapeHtml(cam.name)}"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                referrerpolicy="strict-origin-when-cross-origin"
                                loading="lazy"
                                allowfullscreen>
                            </iframe>
                        </div>
                    </div>
                `).join('');
            });

            updateMobileMapPosition();
            updateMarkersVisibility(selectedCams);
            requestAnimationFrame(renderConnectorLines);
        }

        // 9. 事件綁定 — debounce / rAF 避免過度觸發
        let rafId;
        const debouncedConnectorLines = () => {
            cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(renderConnectorLines);
        };

        map.on('zoomend', renderVideoWall);
        map.on('moveend', renderVideoWall);
        map.on('zoom move', debouncedConnectorLines);
        window.addEventListener('resize', debounce(() => {
            map.invalidateSize();
            renderVideoWall();
            renderConnectorLines();
        }, 150));

        renderVideoWall();

        // 10. 雷達回波開關
        let isRadarVisible = true;
        const radarBtn = document.getElementById('radar-btn');
        radarBtn.classList.add('active');
        radarBtn.addEventListener('click', () => {
            isRadarVisible = !isRadarVisible;
            if (isRadarVisible) {
                radarOverlay.setUrl(`${radarImageUrl}?t=${Date.now()}`);
                radarOverlay.addTo(map);
                radarBtn.classList.add('active');
            } else {
                map.removeLayer(radarOverlay);
                radarBtn.classList.remove('active');
            }
        });

        // 雷達圖每 10 分鐘自動刷新
        setInterval(() => {
            if (isRadarVisible) radarOverlay.setUrl(`${radarImageUrl}?t=${Date.now()}`);
        }, 10 * 60 * 1000);

        // 11. 校正工具 — 僅 ?debug=1 時顯示，修復 eval() 安全漏洞
        const isDebugMode = new URLSearchParams(window.location.search).has('debug');
        const calibrationTool = document.getElementById('calibration-tool');
        const calibBtn = document.getElementById('calib-btn');

        if (calibBtn) calibBtn.style.display = isDebugMode ? '' : 'none';

        if (isDebugMode && calibBtn) {
            calibBtn.addEventListener('click', () => {
                calibrationTool.style.display = calibrationTool.style.display === 'none' ? 'block' : 'none';
            });

            ['n', 's', 'w', 'e'].forEach(dir => {
                document.getElementById(`slider-${dir}`).addEventListener('input', () => {
                    const vals = {
                        n: parseFloat(document.getElementById('slider-n').value).toFixed(3),
                        s: parseFloat(document.getElementById('slider-s').value).toFixed(3),
                        w: parseFloat(document.getElementById('slider-w').value).toFixed(3),
                        e: parseFloat(document.getElementById('slider-e').value).toFixed(3)
                    };
                    document.getElementById(`val-${dir}`).innerText = vals[dir];
                    radarOverlay.setBounds([[parseFloat(vals.s), parseFloat(vals.w)], [parseFloat(vals.n), parseFloat(vals.e)]]);
                    document.getElementById('copy-code').value = `[[${vals.s}, ${vals.w}], [${vals.n}, ${vals.e}]]`;
                });
            });
        }
    </script>
</body>
</html>
